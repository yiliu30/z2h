name: Build Skill Catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build catalog and plugin metadata
        run: |
          python scripts/build-catalog.py
          python scripts/export-plugin.py

      - name: Verify catalog
        run: python -m json.tool catalog.json > /dev/null

      - name: Verify marketplace
        run: python -m json.tool .agents/plugins/marketplace.json > /dev/null

      - name: Commit catalog (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json .agents/plugins/marketplace.json plugins/agent-skills-hub-custom/.codex-plugin/plugin.json
          git diff --staged --quiet || git commit -m "chore: update generated skill metadata [skip ci]"
          git push
